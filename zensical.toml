[project]
site_name = "Patryk's Website"
site_url = "https://jpatryk13.github.io/my-website/"
site_description = "Personal website and blog docs"
site_author = "Patryk Jesionka"
copyright = "&copy; 2026 Patryk Jesionka"

nav = [
  { "Home" = "index.md" },
  { "Projects" = [
    "projects/index.md",
    { "Python Library for Runtime Type Checks" = "projects/pyvalidify.md" },
  ] },
]

[project.theme.icon]
logo = "lucide/chess-knight"

[project.theme]
favicon = "images/lucide-chess-knight-logo-white-bg.svg"
language = "en"
features = [
  # Back-to-top button
  "navigation.top",
  # Highlight search results after following the link from the search results
  "search.highlight",
  # Instant loading of pages
  "navigation.instant",
  # Auto update URL based on section
  "navigation.tracking",
  # Top-level sections are rendered on top - as tabs
  "navigation.tabs",
  # Tabs are always visible on top
  "navigation.tabs.sticky",
  # Breadcrumbs
  "navigation.path",
  # Provide context for each section as index.md
  "navigation.indexes",
  # For copy/select/annotate refer to https://zensical.org/docs/authoring/code-blocks/?h=code+
  "content.code.copy",
  "content.code.select",
  "content.code.annotate"
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.extra]
generator = false

# Needed for many features; allows to add HTML attributes and CSS classes to md elements
[project.markdown_extensions.attr_list]

# Buttons (.md-button) and icon shortcodes (:fontawesome-...:) in Markdown
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

# Fancy code blocks https://zensical.org/docs/authoring/code-blocks/?h=code+
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]